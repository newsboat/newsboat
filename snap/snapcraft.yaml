name: newsboat
title: Newsboat
license: MIT
version: git
base: core26
summary: An RSS/Atom feed reader for text terminals
description: |
  Newsboat is an RSS/Atom feed reader for the text console. It's an actively
  maintained fork of Newsbeuter.
website: https://newsboat.org
contact:
  - https://github.com/newsboat/newsboat/issues
  - newsboat@googlegroups.com
issues: https://github.com/newsboat/newsboat/issues
source-code: https://github.com/newsboat/newsboat
grade: stable
confinement: strict

apps:
  newsboat:
    command: usr/local/bin/newsboat
    environment:
      LOCPATH: "$SNAP/usr/lib/locale"
      TERMINFO_DIRS: "$SNAP/lib/terminfo:$SNAP/usr/share/terminfo"
    plugs:
      - network
      - home
      - desktop
  podboat:
    command: usr/local/bin/podboat
    environment:
      LOCPATH: "$SNAP/usr/lib/locale"
      TERMINFO_DIRS: "$SNAP/lib/terminfo:$SNAP/usr/share/terminfo"
    plugs:
      - network
      - home
      - desktop

parts:
  rust:
    plugin: nil
    build-snaps:
      - rustup
    override-build: |
      rustup install stable
  newsboat:
    after:
      - rust
    plugin: make
    source: .
    build-packages:
      - pkg-config
      - libsqlite3-dev
      - libcurl4-openssl-dev
      - libxml2-dev
      - libstfl-dev
      - libjson-c-dev
      - libncursesw5-dev
      - asciidoctor
      - libssl-dev
      - gettext
      - g++
    stage-packages:
      - libxml2-16
      - librtmp1
      - locales-all
      - libcurl4t64
      - libstfl0
      - kitty-terminfo
      - ncurses-base
      - ncurses-term
