name: Sanitizers

on:
  push:
    paths-ignore: &ignored_paths
      - contrib/**
      - doc/**
      - po/**
      - snap/**
  pull_request:
    paths_ignore: *ignored_paths

jobs:
  asan_cpp:
    name: AddressSanitizer C++ (Clang 22, Ubuntu 26.04)
    runs-on: ubuntu-24.04

    steps:
      - name: Check out the code
        uses: actions/checkout@v7

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4

      # We need to pass UID and GID into `docker buildx build`, but the action
      # doesn't support assigning build args from shell commands. This step is
      # a workaround: it sets environment variables which are then referenced
      # in the Docker build args
      - name: Set UID and GID environment variables
        run: |
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          file: docker/ubuntu_26.04-build-tools.dockerfile
          build-args: |
            # We need llvm-symbolizer from llvm-22-tools to demangle symbols in
            # sanitizer's reports. ASAN library is in libclang-rt-dev
            cxx_package=clang-22 llvm-22 libclang-rt-22-dev
            cc=clang-22
            cxx=clang++-22
            UID=${{ env.UID }}
            GID=${{ env.GID }}

          cache-from: type=gha,scope=newsboat/ci-26.04-clang22
          cache-to: type=gha,scope=newsboat/ci-26.04-clang22,mode=max

          push: false
          load: true

          tags: newsboat/ci-26.04-clang22:latest

      - name: Pre-create ~/.cargo subdirs
        run: |
          mkdir --parents ~/.cargo/git
          mkdir --parents ~/.cargo/registry

      - name: Cache ~/.cargo
        uses: actions/cache@v6
        id: cargo_cache
        with:
          key: cargo-${{ hashFiles('Cargo.lock', '**/Cargo.toml') }}
          path: |
            ~/.cargo/git
            ~/.cargo/registry

      - name: Build and run tests with ASAN
        run: |
          docker run \
            --rm \
            --tty \
            --mount type=bind,source=$HOME/.cargo/git,target=/home/builder/.cargo/git \
            --mount type=bind,source=$HOME/.cargo/registry,target=/home/builder/.cargo/registry \
            --mount type=bind,source=$(pwd),target=/home/builder/src \
            --env CXXFLAGS='-fsanitize=address -fsanitize-address-use-after-scope -fno-omit-frame-pointer -fno-optimize-sibling-calls -g' \
            --env ASAN_OPTIONS='check_initialization_order=1:detect_stack_use_after_return=1' \
            newsboat/ci-26.04-clang22:latest \
            sh -c \
              'make -j$(nproc) test && \
              cd test && \
              ./test --order=rand --rng-seed=time'

  asan_rust:
    name: AddressSanitizer Rust (Clang 22, Ubuntu 26.04)
    runs-on: ubuntu-24.04

    steps:
      - name: Check out the code
        uses: actions/checkout@v7

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4

      # We need to pass UID and GID into `docker buildx build`, but the action
      # doesn't support assigning build args from shell commands. This step is
      # a workaround: it sets environment variables which are then referenced
      # in the Docker build args
      - name: Set UID and GID environment variables
        run: |
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          file: docker/ubuntu_26.04-build-tools.dockerfile
          build-args: |
            # We need llvm-symbolizer from llvm-22-tools to demangle symbols in
            # sanitizer's reports. ASAN library is in libclang-rt-dev
            cxx_package=clang-22 llvm-22 libclang-rt-22-dev
