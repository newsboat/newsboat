name: Code formatting

on:
  push:
  pull_request:

jobs:
  code_formatting:
    name: Code formatting
    runs-on: ubuntu-24.04

    steps:
      - name: Check out the code
        uses: actions/checkout@v7

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4

      # We need to pass UID and GID into `docker buildx build`, but the action
      # doesn't support assigning build args from shell commands. This step is
      # a workaround: it sets environment variables which are then referenced
      # in the Docker build args
      - name: Set UID and GID environment variables
        run: |
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          file: docker/code-formatting-tools.dockerfile
          build-args: |
            UID=${{ env.UID }}
            GID=${{ env.GID }}

          cache-from: type=gha,scope=newsboat/ci-code-formatting
          cache-to: type=gha,scope=newsboat/ci-code-formatting,mode=max

          push: false
          load: true

          tags: newsboat/ci-code-formatting:latest

      - name: Check code formatting
        # --exit-code forces git-diff to exit with code 1 if there were
        # changes; that'll fail the build, which is exactly what we need
        run: |
          docker run \
            --rm \
            --tty \
            --mount type=bind,source=$(pwd),target=/workspace \
            newsboat/ci-code-formatting:latest \
            sh -c \
              'make fmt && git config --global --add safe.directory /workspace && git diff --exit-code'
