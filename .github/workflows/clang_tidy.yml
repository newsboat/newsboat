name: "clang-tidy (Clang 21, Ubuntu 25.10)"

on:
  push:
    paths-ignore: &ignored_paths
      - contrib/*
      - contrib/**/*
      - doc/*
      - doc/**/*
      - docker/*
      - docker/**/*
      - po/*
      - po/**/*
      - snap/*
      - snap/**/*
  pull_request:
    paths_ignore: *ignored_paths

jobs:
  clang_tidy:
    name: Run clang-tidy
    runs-on: ubuntu-24.04

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4

      # We need to pass UID and GID into `docker buildx build`, but the action
      # doesn't support assigning build args from shell commands. This step is
      # a workaround: it sets environment variables which are then referenced
      # in the Docker build args
      - name: Set UID and GID environment variables
        run: |
          echo "UID=$(id -u)" >> $GITHUB_ENV
          echo "GID=$(id -g)" >> $GITHUB_ENV

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          file: docker/ubuntu_25.10-build-tools.dockerfile
          build-args: |
            cxx_package=clang-tidy-21
            cc=clang-21
            cxx=clang++-21
            UID=${{ env.UID }}
            GID=${{ env.GID }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          push: false
          load: true

          tags: local/container:latest

      - name: Cache ~/.cargo
        uses: actions/cache@v5
        id: cargo_cache
        with:
          key: cargo-${{ hashFiles('Cargo.lock', '**/Cargo.toml') }}
          path: |
            ~/.cargo/git
            ~/.cargo/registry

      - name: Run clang-tidy
        run: |
          docker run \
            --rm \
            --tty \
            --mount type=bind,source=~/.cargo/git,target=/home/builder/.cargo/git \
            --mount type=bind,source=~/.cargo/registry,target=/home/builder/.cargo/registry \
            --mount type=bind,source=$(pwd),target=/home/builder/src \
            --env CLANG_TIDY=clang-tidy-21 \
            local/container:latest \
            make -j$(nproc) --keep-going clang-tidy
